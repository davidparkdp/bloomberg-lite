<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bloomberg Lite</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #0a0a0a;
    color: #00ffcc;
    font-family: monospace;
    font-size: 13px;
    overflow: hidden; /* Prevent body scrollbars during resize */
}
.header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    color: orange;
    padding: 6px 12px;
    border-bottom: 1px solid #333;
    background: #111;
}
.header-title { font-size: 14px; font-weight: bold; letter-spacing: 2px; }
.header-time  { color: #888; font-size: 11px; margin-left: auto; }
.tabs {
    flex-shrink: 0;
    display: flex;
    flex-wrap: wrap; /* Allow tabs to wrap if many pages exist */
    gap: 2px;
    padding: 4px 12px;
    background: #111;
    border-bottom: 1px solid #333;
    align-items: center;
}
.tab {
    padding: 3px 14px;
    cursor: pointer;
    border: 1px solid #444;
    color: #888;
    background: transparent;
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 1px;
    transition: all .15s;
}
.tab.active { border-color: orange; color: orange; background: rgba(255,165,0,.08); }
.tab:hover:not(.active) { color: #ccc; border-color: #666; }

.search-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
}
.search-wrap input {
    background: #1a1a1a;
    border: 1px solid #444;
    color: #ffb300;
    font-family: monospace;
    font-size: 12px;
    padding: 3px 8px;
    width: 180px;
    outline: none;
}
.search-wrap input:focus { border-color: orange; }
.search-wrap input::placeholder { color: #555; }
.search-info {
    color: #888;
    font-size: 10px;
    white-space: nowrap;
    min-width: 50px;
}
.sort-select {
    background: #1a1a1a;
    border: 1px solid #444;
    color: #888;
    font-family: monospace;
    font-size: 11px;
    padding: 3px 4px;
    outline: none;
    cursor: pointer;
}

#pages {
    flex: 1 1 0;
    min-height: 0;
    position: relative;
}
.page {
    display: none;
    position: absolute;
    inset: 0;
    padding: 4px 6px;
}
.page.active { display: flex; }
.col {
    flex: 1;
    min-width: 330px; /* Minimum width to prevent row squishing */
    overflow: hidden;
    padding: 0 3px;
    border-right: 1px solid #1a1a1a;
}
.col:last-child { border-right: none; }

.statusbar {
    flex-shrink: 0;
    background: #111;
    border-top: 1px solid #222;
    padding: 2px 12px;
    font-size: 10px;
    color: #555;
    display: flex;
    gap: 16px;
}

.slot { height: 21px; line-height: 21px; overflow: hidden; }
.slot-heading {
    color: #ddd;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    display: grid;
    grid-template-columns: 48px 82px 66px 58px 56px 20px;
    align-items: center;
    gap: 1px;
    border-bottom: 1px solid #0f0f0f;
}
.slot-data {
    display: grid;
    grid-template-columns: 48px 82px 66px 58px 56px 20px;
    align-items: center;
    gap: 1px;
    border-bottom: 1px solid #0f0f0f;
}
.slot-data:hover { background: #141414; }

.cell-ticker { text-align: left; font-weight: bold; color: #ffb300; cursor: pointer; }
.cell-name {
    text-align: left; color: #ffb300; font-size: 11px;
    padding-right: 3px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
}
.cell-price, .cell-chg, .cell-pct { text-align: right; }
.cell-age { text-align: right; font-size: 9px; color: #ffb300 !important; opacity: 0.6; }
.green { color: #00e676; }
.red   { color: #ff5252; }
.slot-data.search-match { background: rgba(255,165,0,.12); }
.slot-data.search-current { background: rgba(255,165,0,.35); }
</style>
</head>
<body>
<div class="header">
    <div class="header-title">◆ BLOOMBERG LITE</div>
    <div class="header-time" id="clock"></div>
</div>
<div class="tabs" id="tabs">
    <div class="search-wrap">
        <select id="sortSelect" class="sort-select">
            <option value="manual">Sort: Manual</option>
            <option value="alpha">Sort: A→Z</option>
            <option value="pct">Sort: % Chg</option>
            <option value="pct-ex">Sort: % Chg (ex L/S)</option>
        </select>
        <input type="text" id="searchInput" placeholder="Search ticker or name…" autocomplete="off">
        <span class="search-info" id="searchInfo"></span>
    </div>
</div>
<div id="pages"></div>
<div class="statusbar">
    <span id="status">Loading… (Click anywhere on page if background updates pause)</span>
    <span id="counter"></span>
</div>

<script>
const API_KEY = "d6atqi1r01qnr27isiq0d6atqi1r01qnr27isiqg";
const CALL_DELAY_MS = 1200;
const PAUSE_ON_429 = 4000;
const MIN_COL_WIDTH = 330;
const SLOT_HEIGHT = 21;
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT46q9pwRZMT27tLH6taYNgIYXFPkLdnjOhv3KqqGJGJY_Dn1SJ6yI4v1jaODaHy33TwbM-L5z14UWF/pub?gid=0&single=true&output=csv";

let currentNumCols = 1;
let slotsPerCol = 10;
let originalItems = [];
let quoteStore = {};
let tickerMeta = {};
let masterList = [];
let numPages = 0;
let currentSort = "manual";
let resizeTimeout;
let worker;
let audioCtx;

// Keep tab alive using an inaudible audio wave loop (Tricks browser into active execution)
function preventTabSleeping() {
    if (audioCtx) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const buffer = audioCtx.createBuffer(1, 1, 22050); // Empty silent buffer
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.loop = true;
        source.connect(audioCtx.destination);
        source.start();
    } catch (e) {
        console.log("Audio preservation blocked: click page once to initialize.");
    }
}

// Automatically request audio initialization on user activity
document.addEventListener('click', preventTabSleeping, { once: true });

// Utility functions
const sleep = ms => new Promise(r => setTimeout(r, ms));
function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent = now.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}) + "  " + now.toLocaleTimeString("en-US",{hour12:false});
}
setInterval(updateClock, 1000); updateClock();

function ageLabel(ts) {
    if (!ts) return "";
    const s = Math.floor((Date.now()-ts)/1000);
    if (s < 60) return s+"s";
    if (s < 3600) return Math.floor(s/60)+"m";
    return Math.floor(s/3600)+"h";
}

async function loadCSV(url) {
    const text = await (await fetch(url)).text();
    return text.trim().split("\n").map(line => {
        const fields = [];
        let cur = "", inQ = false;
        for (const ch of line) {
            if (ch === '"') inQ = !inQ;
            else if (ch === ',' && !inQ) { fields.push(cur.trim()); cur = ""; }
            else cur += ch;
        }
        fields.push(cur.trim());
        return fields;
    });
}

async function loadUniqueItems() {
    const rows = await loadCSV(SHEET_URL);
    return rows.map(r => ({ group: (r[0]||"").trim(), ticker: (r[1]||"").trim(), name: (r[2]||"").trim() }))
               .filter(item => item.group && item.ticker);
}

function sortItems(items, mode) {
    if (mode === "manual") return [...items];
    const groupOrder = [];
    const groupMap = {};
    items.forEach(item => {
        if (!groupMap[item.group]) { groupMap[item.group] = []; groupOrder.push(item.group); }
        groupMap[item.group].push({ ...item });
    });
    groupOrder.forEach(g => {
        const arr = groupMap[g];
        if (mode === "alpha") arr.sort((a,b) => a.ticker.localeCompare(b.ticker));
        else if (mode === "pct" || (mode === "pct-ex" && !["LONG","SHORT"].includes(g.toUpperCase()))) {
            arr.sort((a,b) => (quoteStore[b.ticker]?.dp ?? -9999) - (quoteStore[a.ticker]?.dp ?? -9999));
        }
    });
    return groupOrder.flatMap(g => groupMap[g]);
}

function calculateLayoutDimensions() {
    const pagesEl = document.getElementById("pages");
    const h = pagesEl.offsetHeight;
    const w = pagesEl.offsetWidth;
    
    slotsPerCol = Math.max(5, Math.floor(h / SLOT_HEIGHT));
    currentNumCols = Math.max(1, Math.floor(w / MIN_COL_WIDTH));
}

function fullRebuild() {
    calculateLayoutDimensions();
    const sorted = sortItems(originalItems, currentSort);
    
    // Create slot stream
    const slots = [];
    const groupSeen = new Set();
    sorted.forEach(item => {
        if (!groupSeen.has(item.group)) {
            groupSeen.add(item.group);
            slots.push({ type: "heading", text: item.group });
        }
        slots.push({ type: "data", ...item });
    });

    // Pack columns
    const columns = [];
    let col = [];
    slots.forEach((s, i) => {
        if (col.length >= slotsPerCol || (s.type === "heading" && col.length === slotsPerCol - 1)) {
            while (col.length < slotsPerCol) col.push({ type: "empty" });
            columns.push(col);
            col = [];
        }
        col.push(s);
    });
    while (col.length < slotsPerCol) col.push({ type: "empty" });
    columns.push(col);

    numPages = Math.ceil(columns.length / currentNumCols);
    masterList = [];
    tickerMeta = {};

    // Build DOM
    const tabsEl = document.getElementById("tabs");
    const pagesEl = document.getElementById("pages");
    tabsEl.querySelectorAll(".tab").forEach(t => t.remove());
    pagesEl.innerHTML = "";
    
    const searchWrap = tabsEl.querySelector(".search-wrap");

    for (let p = 0; p < numPages; p++) {
        const tab = document.createElement("button");
        tab.className = "tab" + (p === 0 ? " active" : "");
        tab.textContent = `PAGE ${p+1}`;
        tab.onclick = () => switchPage(p);
        tabsEl.insertBefore(tab, searchWrap);

        const page = document.createElement("div");
        page.className = "page" + (p === 0 ? " active" : "");
        page.id = `page-${p}`;
        
        for (let c = 0; c < currentNumCols; c++) {
            const colIdx = p * currentNumCols + c;
            const colDiv = document.createElement("div");
            colDiv.className = "col";
            
            if (colIdx < columns.length) {
                columns[colIdx].forEach(slot => {
                    const el = document.createElement("div");
                    el.className = "slot";
                    if (slot.type === "heading") {
                        el.classList.add("slot-heading");
                        el.innerHTML = `<div style="grid-column:1/3">${slot.text}</div><div></div><div></div><div></div><div></div>`;
                    } else if (slot.type === "data") {
                        const sid = masterList.length;
                        el.classList.add("slot-data");
                        el.dataset.slotId = sid;
                        masterList.push(slot.ticker);
                        tickerMeta[sid] = { ...slot, pageIdx: p, colIdx: c };
                        el.innerHTML = `<div class="cell-ticker">${slot.ticker}</div><div class="cell-name">${slot.name}</div><div class="cell-price">—</div><div class="cell-chg"></div><div class="cell-pct"></div><div class="cell-age"></div>`;
                    } else el.classList.add("slot-empty");
                    colDiv.appendChild(el);
                });
            }
            page.appendChild(colDiv);
        }
        pagesEl.appendChild(page);
    }
    
    // Restore prices
    masterList.forEach((ticker, i) => { if (quoteStore[ticker]) renderTicker(i); });

    updateWorkerTickers();
}

function renderTicker(idx) {
    const meta = tickerMeta[idx];
    const q = quoteStore[meta.ticker];
    const row = document.querySelector(`[data-slot-id="${idx}"]`);
    if (!row || !q) return;
    const up = q.d >= 0, color = up ? "green" : "red", sign = up ? "+" : "";
    row.className = `slot slot-data ${color}`;
    row.innerHTML = `<div class="cell-ticker">${meta.ticker}</div><div class="cell-name" title="${meta.name}">${meta.name}</div><div class="cell-price">${q.c.toFixed(2)}</div><div class="cell-chg">${sign}${q.d.toFixed(2)}</div><div class="cell-pct">${sign}${q.dp.toFixed(2)}%</div><div class="cell-age">${ageLabel(q.updatedAt)}</div>`;
}

function switchPage(idx) {
    document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", i===idx));
    document.querySelectorAll(".page").forEach((p,i) => p.classList.toggle("active", i===idx));
}

async function fetchQuote(ticker) {
    const url = `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(ticker)}&token=${API_KEY}`;
    try {
        const res = await fetch(url);
        if (res.status === 429) { await sleep(PAUSE_ON_429); return; }
        const data = await res.json();
        if (data && data.c) {
            quoteStore[ticker] = { c:data.c, d:data.d, dp:data.dp, updatedAt:Date.now() };
            masterList.forEach((t, i) => { if (t === ticker) renderTicker(i); });
        }
    } catch (e) {}
}

// Worker Engine Setup
function startBackgroundWorker() {
    const workerCode = `
        let timer = null;
        let tickers = [];
        let index = 0;
        let delay = 1200;

        self.onmessage = function(e) {
            if (e.data.type === 'START') {
                tickers = e.data.tickers;
                delay = e.data.delay;
                index = 0;
                
                clearInterval(timer);
                if (tickers.length === 0) return;

                timer = setInterval(() => {
                    self.postMessage({ type: 'FETCH', ticker: tickers[index], index: index, total: tickers.length });
                    index = (index + 1) % tickers.length;
                }, delay);
            }
        };
    `;

    const blob = new Blob([workerCode], { type: 'application/javascript' });
    worker = new Worker(URL.createObjectURL(blob));

    worker.onmessage = async function(e) {
        if (e.data.type === 'FETCH') {
            const { ticker, index, total } = e.data;
            document.getElementById("status").textContent = `Fetching ${ticker}...`;
            document.getElementById("counter").textContent = `${index + 1} / ${total}`;
            await fetchQuote(ticker);
        }
    };

    updateWorkerTickers();
}

function updateWorkerTickers() {
    if (!worker) return;
    const uniqueTickers = [...new Set(masterList)];
    worker.postMessage({ type: 'START', tickers: uniqueTickers, delay: CALL_DELAY_MS });
}

// Resize Guardian (Prevents blanking layout arrays on invisible frame updates)
const resizeObserver = new ResizeObserver(() => {
    if (document.hidden) return; 
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
        fullRebuild();
    }, 200);
});

async function init() {
    originalItems = await loadUniqueItems();
    resizeObserver.observe(document.getElementById("pages"));
    fullRebuild();
    startBackgroundWorker();
}

document.getElementById("sortSelect").addEventListener("change", e => {
    currentSort = e.target.value;
    fullRebuild();
});

init();
</script>
</body>
</html>
