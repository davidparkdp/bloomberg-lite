<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bloomberg Lite</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
    height: 100%;
    display: flex;
    flex-direction: column;
    background: #0a0a0a;
    color: #00ffcc;
    font-family: monospace;
    font-size: 13px;
    overflow: hidden; /* Prevent body scrollbars during resize */
}
.header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    color: orange;
    padding: 6px 12px;
    border-bottom: 1px solid #333;
    background: #111;
}
.header-title { font-size: 14px; font-weight: bold; letter-spacing: 2px; }
.header-time  { color: #888; font-size: 11px; margin-left: auto; }
.tabs {
    flex-shrink: 0;
    display: flex;
    flex-wrap: wrap; /* Allow tabs to wrap if many pages exist */
    gap: 2px;
    padding: 4px 12px;
    background: #111;
    border-bottom: 1px solid #333;
    align-items: center;
}
.tab {
    padding: 3px 14px;
    cursor: pointer;
    border: 1px solid #444;
    color: #888;
    background: transparent;
    font-family: monospace;
    font-size: 11px;
    letter-spacing: 1px;
    transition: all .15s;
}
.tab.active { border-color: orange; color: orange; background: rgba(255,165,0,.08); }
.tab:hover:not(.active) { color: #ccc; border-color: #666; }

.search-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
}
.search-wrap input {
    background: #1a1a1a;
    border: 1px solid #444;
    color: #ffb300;
    font-family: monospace;
    font-size: 12px;
    padding: 3px 8px;
    width: 180px;
    outline: none;
}
.search-wrap input:focus { border-color: orange; }
.search-wrap input::placeholder { color: #555; }
.search-info {
    color: #888;
    font-size: 10px;
    white-space: nowrap;
    min-width: 50px;
}
.sort-select {
    background: #1a1a1a;
    border: 1px solid #444;
    color: #888;
    font-family: monospace;
    font-size: 11px;
    padding: 3px 4px;
    outline: none;
    cursor: pointer;
}

#pages {
    flex: 1 1 0;
    min-height: 0;
    position: relative;
}
.page {
    display: none;
    position: absolute;
    inset: 0;
    padding: 4px 6px;
}
.page.active { display: flex; }
.col {
    flex: 1;
    min-width: 330px; /* Minimum width to prevent row squishing */
    overflow: hidden;
    padding: 0 3px;
    border-right: 1px solid #1a1a1a;
}
.col:last-child { border-right: none; }

.statusbar {
    flex-shrink: 0;
    background: #111;
    border-top: 1px solid #222;
    padding: 2px 12px;
    font-size: 10px;
    color: #555;
    display: flex;
    gap: 16px;
}

.slot { height: 21px; line-height: 21px; overflow: hidden; }
.slot-heading {
    color: #ddd;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    display: grid;
    grid-template-columns: 48px 82px 66px 58px 56px 20px;
    align-items: center;
    gap: 1px;
    border-bottom: 1px solid #0f0f0f;
}
.slot-data {
    display: grid;
    grid-template-columns: 48px 82px 66px 58px 56px 20px;
    align-items: center;
    gap: 1px;
    border-bottom: 1px solid #0f0f0f;
}
.slot-data:hover { background: #141414; }

.cell-ticker { text-align: left; font-weight: bold; color: #ffb300; cursor: pointer; }
.cell-name {
    text-align: left; color: #ffb300; font-size: 11px;
    padding-right: 3px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
}
.cell-price, .cell-chg, .cell-pct { text-align: right; }
.cell-age { text-align: right; font-size: 9px; color: #ffb300 !important; opacity: 0.6; }
.green { color: #00e676; }
.red   { color: #ff5252; }
.slot-data.search-match { background: rgba(255,165,0,.12); }
.slot-data.search-current { background: rgba(255,165,0,.35); }
</style>
</head>
<body>
<div class="header">
    <div class="header-title">◆ BLOOMBERG LITE</div>
    <div class="header-time" id="clock"></div>
</div>
<div class="tabs" id="tabs">
    <div class="search-wrap">
        <select id="sortSelect" class="sort-select">
            <option value="manual">Sort: Manual</option>
            <option value="alpha">Sort: A→Z</option>
            <option value="pct">Sort: % Chg</option>
            <option value="pct-ex">Sort: % Chg (ex L/S)</option>
        </select>
        <input type="text" id="searchInput" placeholder="Search ticker or name…" autocomplete="off">
        <span class="search-info" id="searchInfo"></span>
    </div>
</div>
<div id="pages"></div>
<div class="statusbar">
    <span id="status">Loading…</span>
    <span id="counter"></span>
</div>

<script>
const API_KEY = "d6atqi1r01qnr27isiq0d6atqi1r01qnr27isiqg";
const CALL_DELAY_MS = 1200;
const PAUSE_ON_429 = 4000;
const MIN_COL_WIDTH = 330;
const SLOT_HEIGHT = 21;
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT46q9pwRZMT27tLH6taYNgIYXFPkLdnjOhv3KqqGJGJY_Dn1SJ6yI4v1jaODaHy33TwbM-L5z14UWF/pub?gid=0&single=true&output=csv";

let currentNumCols = 1;
let slotsPerCol = 10;
let originalItems = [];
let quoteStore = {};
let tickerMeta = {};
let masterList = [];
let numPages = 0;
let currentSort = "manual";
let currentPageIndex = 0;
let resizeTimeout;
let worker = null;
let searchQuery = "";
let searchMatches = [];   // array of slot ids (masterList indices) matching current query
let searchCurrentIdx = -1; // index into searchMatches, i.e. which match is "current"

// Utility functions
const sleep = ms => new Promise(r => setTimeout(r, ms));
function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent = now.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}) + "  " + now.toLocaleTimeString("en-US",{hour12:false});
}
setInterval(updateClock, 1000); updateClock();

function ageLabel(ts) {
    if (!ts) return "";
    const s = Math.floor((Date.now()-ts)/1000);
    if (s < 60) return s+"s";
    if (s < 3600) return Math.floor(s/60)+"m";
    return Math.floor(s/3600)+"h";
}

async function loadCSV(url) {
    const text = await (await fetch(url)).text();
    return text.trim().split("\n").map(line => {
        const fields = [];
        let cur = "", inQ = false;
        for (const ch of line) {
            if (ch === '"') inQ = !inQ;
            else if (ch === ',' && !inQ) { fields.push(cur.trim()); cur = ""; }
            else cur += ch;
        }
        fields.push(cur.trim());
        return fields;
    });
}

async function loadUniqueItems() {
    const rows = await loadCSV(SHEET_URL);
    return rows.map(r => ({ group: (r[0]||"").trim(), ticker: (r[1]||"").trim(), name: (r[2]||"").trim() }))
               .filter(item => item.group && item.ticker);
}

function sortItems(items, mode) {
    if (mode === "manual") return [...items];
    const groupOrder = [];
    const groupMap = {};
    items.forEach(item => {
        if (!groupMap[item.group]) { groupMap[item.group] = []; groupOrder.push(item.group); }
        groupMap[item.group].push({ ...item });
    });
    groupOrder.forEach(g => {
        const arr = groupMap[g];
        if (mode === "alpha") arr.sort((a,b) => a.ticker.localeCompare(b.ticker));
        else if (mode === "pct" || (mode === "pct-ex" && !["LONG","SHORT"].includes(g.toUpperCase()))) {
            arr.sort((a,b) => (quoteStore[b.ticker]?.dp ?? -9999) - (quoteStore[a.ticker]?.dp ?? -9999));
        }
    });
    return groupOrder.flatMap(g => groupMap[g]);
}

function calculateLayoutDimensions() {
    const pagesEl = document.getElementById("pages");
    const h = pagesEl.offsetHeight;
    const w = pagesEl.offsetWidth;
    
    slotsPerCol = Math.max(5, Math.floor(h / SLOT_HEIGHT));
    currentNumCols = Math.max(1, Math.floor(w / MIN_COL_WIDTH));
}

function fullRebuild() {
    calculateLayoutDimensions();
    const sorted = sortItems(originalItems, currentSort);
    
    // Create slot stream
    const slots = [];
    const groupSeen = new Set();
    sorted.forEach(item => {
        if (!groupSeen.has(item.group)) {
            groupSeen.add(item.group);
            slots.push({ type: "heading", text: item.group });
        }
        slots.push({ type: "data", ...item });
    });

    // Pack columns
    const columns = [];
    let col = [];
    slots.forEach((s, i) => {
        if (col.length >= slotsPerCol || (s.type === "heading" && col.length === slotsPerCol - 1)) {
            while (col.length < slotsPerCol) col.push({ type: "empty" });
            columns.push(col);
            col = [];
        }
        col.push(s);
    });
    while (col.length < slotsPerCol) col.push({ type: "empty" });
    columns.push(col);

    numPages = Math.ceil(columns.length / currentNumCols);
    masterList = [];
    tickerMeta = {};

    // Keep whatever page you were on instead of always snapping back to
    // page 1. currentPageIndex only gets reset to 0 on a real page load
    // (see the `let currentPageIndex = 0;` declaration) or if the page
    // count shrinks below where you were.
    if (currentPageIndex >= numPages) currentPageIndex = Math.max(0, numPages - 1);

    // Build DOM
    const tabsEl = document.getElementById("tabs");
    const pagesEl = document.getElementById("pages");
    tabsEl.querySelectorAll(".tab").forEach(t => t.remove());
    pagesEl.innerHTML = "";
    
    const searchWrap = tabsEl.querySelector(".search-wrap");

    for (let p = 0; p < numPages; p++) {
        const tab = document.createElement("button");
        tab.className = "tab" + (p === currentPageIndex ? " active" : "");
        tab.textContent = `PAGE ${p+1}`;
        tab.onclick = () => switchPage(p);
        tabsEl.insertBefore(tab, searchWrap);

        const page = document.createElement("div");
        page.className = "page" + (p === currentPageIndex ? " active" : "");
        page.id = `page-${p}`;
        
        for (let c = 0; c < currentNumCols; c++) {
            const colIdx = p * currentNumCols + c;
            const colDiv = document.createElement("div");
            colDiv.className = "col";
            
            if (colIdx < columns.length) {
                columns[colIdx].forEach(slot => {
                    const el = document.createElement("div");
                    el.className = "slot";
                    if (slot.type === "heading") {
                        el.classList.add("slot-heading");
                        el.innerHTML = `<div style="grid-column:1/3">${slot.text}</div><div></div><div></div><div></div><div></div>`;
                    } else if (slot.type === "data") {
                        const sid = masterList.length;
                        el.classList.add("slot-data");
                        el.dataset.slotId = sid;
                        masterList.push(slot.ticker);
                        tickerMeta[sid] = { ...slot, pageIdx: p, colIdx: c };
                        el.innerHTML = `<div class="cell-ticker">${slot.ticker}</div><div class="cell-name">${slot.name}</div><div class="cell-price">—</div><div class="cell-chg"></div><div class="cell-pct"></div><div class="cell-age"></div>`;
                    } else el.classList.add("slot-empty");
                    colDiv.appendChild(el);
                });
            }
            page.appendChild(colDiv);
        }
        pagesEl.appendChild(page);
    }
    
    // Restore prices
    masterList.forEach((ticker, i) => { if (quoteStore[ticker]) renderTicker(i); });

    // Rebuilding wipes and recreates every row, which would otherwise
    // silently drop any active search highlighting. Re-apply it here so
    // sort changes / resizes / live re-sorts don't clear your search.
    if (searchQuery) applySearch(searchQuery, false);
}

function renderTicker(idx) {
    const meta = tickerMeta[idx];
    const q = quoteStore[meta.ticker];
    const row = document.querySelector(`[data-slot-id="${idx}"]`);
    if (!row || !q) return;
    const up = q.d >= 0, color = up ? "green" : "red", sign = up ? "+" : "";
    row.className = `slot slot-data ${color}`;
    row.innerHTML = `<div class="cell-ticker">${meta.ticker}</div><div class="cell-name" title="${meta.name}">${meta.name}</div><div class="cell-price">${q.c.toFixed(2)}</div><div class="cell-chg">${sign}${q.d.toFixed(2)}</div><div class="cell-pct">${sign}${q.dp.toFixed(2)}%</div><div class="cell-age">${ageLabel(q.updatedAt)}</div>`;
}

function switchPage(idx) {
    currentPageIndex = idx;
    document.querySelectorAll(".tab").forEach((t,i) => t.classList.toggle("active", i===idx));
    document.querySelectorAll(".page").forEach((p,i) => p.classList.toggle("active", i===idx));
}

// ---------------------------------------------------------------------
// Search
//
// Previously #searchInput existed in the markup with no JS behind it
// at all — typing did nothing. This wires it up: typing filters/
// highlights matching rows across every page (by ticker or name),
// Enter/Shift+Enter (or the arrows) step through matches and jump to
// whichever page a match lives on, and Ctrl/Cmd+F is intercepted so it
// focuses this search box instead of triggering the browser's own
// find bar.
// ---------------------------------------------------------------------
function computeSearchMatches(query) {
    const q = query.trim().toLowerCase();
    if (!q) return [];
    const matches = [];
    for (let sid = 0; sid < masterList.length; sid++) {
        const meta = tickerMeta[sid];
        if (!meta) continue;
        if (meta.ticker.toLowerCase().includes(q) || meta.name.toLowerCase().includes(q)) {
            matches.push(sid);
        }
    }
    return matches; // sids are assigned in reading order (page -> column -> row), so this is already in visual order
}

function applySearch(query, resetToFirst = true) {
    searchQuery = query;
    document.querySelectorAll(".slot-data.search-match, .slot-data.search-current")
        .forEach(el => el.classList.remove("search-match", "search-current"));

    if (!query.trim()) {
        searchMatches = [];
        searchCurrentIdx = -1;
        document.getElementById("searchInfo").textContent = "";
        return;
    }

    searchMatches = computeSearchMatches(query);
    if (resetToFirst || searchCurrentIdx < 0 || searchCurrentIdx >= searchMatches.length) {
        searchCurrentIdx = searchMatches.length ? 0 : -1;
    }

    searchMatches.forEach(sid => {
        const row = document.querySelector(`[data-slot-id="${sid}"]`);
        if (row) row.classList.add("search-match");
    });

    highlightCurrentMatch();
}

function highlightCurrentMatch() {
    const infoEl = document.getElementById("searchInfo");
    if (!searchMatches.length) {
        infoEl.textContent = searchQuery.trim() ? "0/0" : "";
        return;
    }
    const sid = searchMatches[searchCurrentIdx];
    const meta = tickerMeta[sid];
    const row = document.querySelector(`[data-slot-id="${sid}"]`);
    if (row) {
        row.classList.add("search-current");
        if (meta) switchPage(meta.pageIdx);
        row.scrollIntoView({ block: "nearest" });
    }
    infoEl.textContent = `${searchCurrentIdx + 1}/${searchMatches.length}`;
}

function stepSearch(dir) {
    if (!searchMatches.length) return;
    document.querySelectorAll(".slot-data.search-current").forEach(el => el.classList.remove("search-current"));
    searchCurrentIdx = (searchCurrentIdx + dir + searchMatches.length) % searchMatches.length;
    highlightCurrentMatch();
}

const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("input", e => applySearch(e.target.value));
searchInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
        e.preventDefault();
        stepSearch(e.shiftKey ? -1 : 1);
    } else if (e.key === "Escape") {
        searchInput.value = "";
        applySearch("");
        searchInput.blur();
    }
});

// Intercept Ctrl+F / Cmd+F anywhere on the page and redirect it to our
// own search box instead of letting the browser open its native find bar.
document.addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "f") {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
    }
});

// ---------------------------------------------------------------------
// Ticker hyperlink
//
// .cell-ticker had cursor:pointer styling but no click handler, so
// clicking a ticker did nothing. Using delegation on #pages (rather
// than binding per-row) means this keeps working across every
// fullRebuild(), since rows get torn down and recreated on every
// sort/resize.
// ---------------------------------------------------------------------
document.getElementById("pages").addEventListener("click", e => {
    const cell = e.target.closest(".cell-ticker");
    if (!cell) return;
    const row = cell.closest(".slot-data");
    if (!row) return;
    const sid = row.dataset.slotId;
    const meta = tickerMeta[sid];
    if (!meta) return;
    window.open(`https://finance.yahoo.com/quote/${encodeURIComponent(meta.ticker)}`, "_blank", "noopener");
});

// ---------------------------------------------------------------------
// Background polling now lives in a Web Worker.
//
// Why: when a tab is hidden/backgrounded, browsers (Chrome especially)
// throttle setTimeout/setInterval on the MAIN THREAD down to roughly
// once per minute after a few minutes of inactivity. The old rollingLoop()
// used setTimeout-based sleeps on the main thread, so polling basically
// stalled whenever you switched away from the tab.
//
// Web Workers run on a separate thread and are NOT subject to that
// page-visibility timer throttling, so a worker can keep firing fetch()
// calls on schedule even while the tab is in the background. The worker
// does the actual network fetching itself (workers support fetch) and
// just posts results back to the main thread, which only has to touch
// the DOM — no network/timing logic on the throttled thread at all.
// ---------------------------------------------------------------------
function buildWorkerSource() {
    return `
        const API_KEY = ${JSON.stringify(API_KEY)};
        const CALL_DELAY_MS = ${CALL_DELAY_MS};
        const PAUSE_ON_429 = ${PAUSE_ON_429};
        let tickers = [];

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        async function fetchQuote(ticker) {
            const url = \`https://finnhub.io/api/v1/quote?symbol=\${encodeURIComponent(ticker)}&token=\${API_KEY}\`;
            try {
                const res = await fetch(url);
                if (res.status === 429) { await sleep(PAUSE_ON_429); return; }
                const data = await res.json();
                if (data && typeof data.c !== 'undefined') {
                    postMessage({ type: 'quote', ticker, data: { c: data.c, d: data.d, dp: data.dp, updatedAt: Date.now() } });
                }
            } catch (e) {
                // network hiccup, just move on
            }
        }

        // Simple linear rotation through the full ticker universe. Each
        // pass starts at index 0 and works through to the end, then loops.
        // No page-based prioritization, no restarts on visibility change —
        // the queue just runs continuously in the background from wherever
        // it is, only resetting to 0 when the tab is refreshed.
        async function loop() {
            let idx = 0;
            while (true) {
                if (tickers.length === 0) { await sleep(500); continue; }
                if (idx >= tickers.length) idx = 0;
                const ticker = tickers[idx];
                postMessage({ type: 'status', ticker, idx, total: tickers.length });
                await fetchQuote(ticker);
                idx++;
                await sleep(CALL_DELAY_MS);
            }
        }

        self.onmessage = (e) => {
            if (!e.data) return;
            if (e.data.type === 'tickers') {
                tickers = e.data.tickers;
            }
        };

        loop();
    `;
}

function startWorker(tickers) {
    if (worker) {
        // already running, just update the ticker list
        worker.postMessage({ type: 'tickers', tickers });
        return;
    }
    const blob = new Blob([buildWorkerSource()], { type: "application/javascript" });
    worker = new Worker(URL.createObjectURL(blob));

    worker.onmessage = (e) => {
        const msg = e.data;
        if (msg.type === "quote") {
            quoteStore[msg.ticker] = msg.data;
            masterList.forEach((t, i) => { if (t === msg.ticker) renderTicker(i); });
        } else if (msg.type === "status") {
            document.getElementById("status").textContent = `Fetching ${msg.ticker}...`;
            document.getElementById("counter").textContent = `${msg.idx + 1} / ${msg.total}`;
        }
    };
    worker.onerror = (err) => {
        console.error("Worker error:", err);
    };

    worker.postMessage({ type: "tickers", tickers });
}

// ---------------------------------------------------------------------
// Background tab freezing workaround.
//
// The Worker fix stops timer THROTTLING, but Chrome (and others) go
// further: a hidden tab with no audio/video/active connection gets
// fully FROZEN after several minutes — no JS runs at all, in the main
// thread OR in Workers, until you switch back. Tabs that are "audible"
// are exempt from this freeze. So we start an inaudible (gain ~0)
// oscillator on the first user interaction to keep the tab classified
// as active. This has to start on a user gesture because browsers
// block audio autoplay before any interaction.
// ---------------------------------------------------------------------
let audioCtx = null;
function enableBackgroundKeepAlive() {
    if (audioCtx) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        gain.gain.value = 0.00001; // effectively silent, but not literally zero
        osc.frequency.value = 20000;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
    } catch (e) {
        console.warn("Background keep-alive audio could not start:", e);
    }
}
["click", "keydown", "touchstart"].forEach(evt => {
    document.addEventListener(evt, enableBackgroundKeepAlive, { once: true });
});

// Note: we intentionally do NOT reset/restart the worker's rotation on
// visibilitychange. Restarting it every time you switch back to the tab
// meant the queue kept jumping to index 0 instead of continuing forward,
// so tickers later in the list rarely got reached. The worker just keeps
// polling continuously in the background regardless of tab visibility
// (that's the whole point of it living in a Worker); we only need to
// resume the keep-alive audio context if the browser suspended it.
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && audioCtx && audioCtx.state === "suspended") {
        audioCtx.resume().catch(() => {});
    }
});

// Resize Management
const resizeObserver = new ResizeObserver(() => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
        fullRebuild();
    }, 200);
});

async function init() {
    originalItems = await loadUniqueItems();
    resizeObserver.observe(document.getElementById("pages"));
    fullRebuild();

    const uniqueTickers = [...new Set(originalItems.map(item => item.ticker))];
    startWorker(uniqueTickers);
}

document.getElementById("sortSelect").addEventListener("change", e => {
    currentSort = e.target.value;
    fullRebuild();
});

// While sorted by % change, unfetched tickers sort to the bottom of their
// group (fallback -9999), which can make it look like a lot of prices
// "disappeared" right after switching, since the ones that don't have
// data yet all clump together instead of being spread out like they were
// in manual/CSV order. Periodically re-sorting while in a % mode lets
// newly-arrived quotes settle into their correct position as they come in,
// instead of the view staying frozen at the moment you clicked the dropdown.
setInterval(() => {
    if (currentSort === "pct" || currentSort === "pct-ex") fullRebuild();
}, 4000);

init();
</script>
</body>
</html>
